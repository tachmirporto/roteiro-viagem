  });
  if(TALVEZ && TALVEZ.length){
    const accT=el(`<div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><div class="nm">TALVEZ</div><div class="sum">Destinos em aberto — decidir durante a viagem</div><div><span class="tg" style="background:rgba(155,143,255,.15);color:#9b8fff">Sem data/custo definido</span></div><div class="chv">▾</div></div><div class="acc-b"></div></div>`);
    const bodyT=accT.querySelector('.acc-b');
    TALVEZ.forEach(nome=>{
      bodyT.appendChild(el(`<div class="crow"><div class="flag">🤔</div><div class="info"><div class="nm">${nome}</div><div class="desc">Sem data ou custo definido. Avaliar conforme andamento da viagem.</div></div></div>`));
    });
    cont.appendChild(accT);
  }
  return wrap;
}

async function salvarCustoExtra(item){
  try{
    const ref = doc(collection(dbFs,'custos_extras'));
    await setDoc(ref, item);
    return ref.id;
  }catch(e){ console.error('Erro ao salvar custo extra:',e); return null; }
}
async function removerCustoExtra(id){
  try{ await deleteDoc(doc(dbFs,'custos_extras',id)); }
  catch(e){ console.error('Erro ao remover custo extra:',e); }
}

function pageCustos(){
  let total=0; const meses={};
  PAISES_INDEX.forEach(id=>{const p=PAISES_DB[id];total+=p.dias*p.dpd;const mk=mesKey(p.ini);(meses[mk]=meses[mk]||[]).push(id)});
  const totalTrens = TRENS.reduce((s,t)=>s+t.brl,0);
  const totalExtras = CUSTOS_EXTRAS.reduce((s,c)=>s+(c.valor||0),0);
  total += totalTrens + totalExtras;
  const pct=(total/META.orcamento*100).toFixed(1);
  const wrap=el(`<div><div class="cnt"><div><div class="lb">Custos da Viagem</div><div class="v">${fmtR(total)} <small>/ ${fmtR(META.orcamento)}</small></div></div><div class="bar-wrap"><div class="bar-track"><div class="bar-fill ${pct>90?(pct>100?'d':'w'):''}" style="width:${Math.min(pct,100)}%"></div></div><div class="pct"><b>${pct}%</b> do orçamento</div></div></div><div class="info">ℹ️ Estimativas mochilão (hospedagem+alimentação+transporte local+passeios) <b>+ passagens de trem entre cidades</b> <b>+ custos extras lançados manualmente</b>. Vistos somados em separado. Voos internacionais não incluídos (compra mais perto da data). Trens noturnos priorizados quando mais baratos que a opção diurna — economia de 1 noite de hospedagem.</div><div class="sect">Custos extras (antes da viagem)</div><div id="ce"></div><div class="sect">Custos por mês</div><div id="mc"></div></div>`);

  const contExtras = wrap.querySelector('#ce');
  function renderExtras(){
    contExtras.innerHTML='';
    const totExtrasAtual = CUSTOS_EXTRAS.reduce((s,c)=>s+(c.valor||0),0);
    const acc=el(`<div class="acc">
      <div class="acc-h" onclick="toggleAcc(this)"><div class="nm">EXTRAS</div><div class="sum">Gastos antes da viagem (equipamento, seguros, vistos antecipados, etc.)</div><div class="tot">${fmtR(totExtrasAtual)}</div><div class="chv">▾</div></div>
      <div class="acc-b"></div>
    </div>`);
    const body = acc.querySelector('.acc-b');
    CUSTOS_EXTRAS.forEach(c=>{
      body.appendChild(el(`<div class="crow2"><span class="nm">${c.descricao}</span><span class="d">${c.data||''}</span><span class="v">${fmtR(c.valor)}</span><button class="rmv" data-rmextra="${c.id}" style="margin-left:8px">✕</button></div>`));
    });
    const formRow = el(`<div style="display:flex;gap:8px;padding:14px 20px;flex-wrap:wrap">
      <input type="text" id="ce-desc" placeholder="Descrição (ex: mochila nova)" style="flex:2;min-width:160px;background:var(--surf2);border:1px solid var(--bd);color:var(--tx);padding:8px 10px;border-radius:var(--rs);font-family:var(--f);font-size:13px">
      <input type="number" id="ce-valor" placeholder="Valor (R$)" style="flex:1;min-width:100px;background:var(--surf2);border:1px solid var(--bd);color:var(--ok);padding:8px 10px;border-radius:var(--rs);font-family:var(--m);font-size:13px">
      <button class="add" id="ce-salvar" style="width:auto;padding:8px 18px">💾 Salvar</button>
    </div>`);
    body.appendChild(formRow);
    contExtras.appendChild(acc);

    body.querySelectorAll('[data-rmextra]').forEach(btn=>{
      btn.onclick=async()=>{
        const id = btn.dataset.rmextra;
        CUSTOS_EXTRAS = CUSTOS_EXTRAS.filter(x=>x.id!==id);
        renderExtras();
        atualizarContadorTotal();
        await removerCustoExtra(id);
      };
    });
    $('#ce-salvar').onclick=async()=>{
      const desc = $('#ce-desc').value.trim();
      const valor = parseFloat($('#ce-valor').value);
      if(!desc || !valor || valor<=0){ alert('Preencha descrição e valor válido.'); return; }
      const item = {descricao:desc, valor:valor, data:new Date().toISOString().slice(0,10)};
      const novoId = await salvarCustoExtra(item);
      if(novoId){
        item.id = novoId;
        CUSTOS_EXTRAS.push(item);
        renderExtras();
        atualizarContadorTotal();
      }else{
        alert('Erro ao salvar — tente novamente.');
      }
    };
  }
  function atualizarContadorTotal(){
    let novoTotal=0;
    PAISES_INDEX.forEach(id=>{const p=PAISES_DB[id];novoTotal+=p.dias*p.dpd});
    novoTotal += totalTrens + CUSTOS_EXTRAS.reduce((s,c)=>s+(c.valor||0),0);
    const novoPct=(novoTotal/META.orcamento*100).toFixed(1);
    wrap.querySelector('.cnt .v').innerHTML = `${fmtR(novoTotal)} <small>/ ${fmtR(META.orcamento)}</small>`;
    wrap.querySelector('.bar-fill').style.width = Math.min(novoPct,100)+'%';
    wrap.querySelector('.bar-fill').className = 'bar-fill ' + (novoPct>90?(novoPct>100?'d':'w'):'');
    wrap.querySelector('.pct').innerHTML = `<b>${novoPct}%</b> do orçamento`;
  }
  renderExtras();

  const cont=wrap.querySelector('#mc');
  Object.entries(meses).forEach(([mk,ids])=>{
    const totMesHosp=ids.reduce((s,id)=>s+PAISES_DB[id].dias*PAISES_DB[id].dpd,0);
    const trensDoMes = TRENS.filter(t=>t.mes===mk);
    const totMesTrens = trensDoMes.reduce((s,t)=>s+t.brl,0);
    const totMes = totMesHosp + totMesTrens;
    const acc=el(`<div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><div class="nm">${mk}</div><div class="sum"></div><div class="tot">${fmtR(totMes)}</div><div class="chv">▾</div></div><div class="acc-b"></div></div>`);
    const body=acc.querySelector('.acc-b');
    ids.forEach(id=>{
      const p=PAISES_DB[id]; const totPais=p.dias*p.dpd;
      const sub=el(`<div><div class="sub-acc-h" onclick="toggleAcc(this)"><span class="nm">${FLAGS[id]} ${p.nome}</span><span class="tot">${p.dpd>0?fmtR(totPais):'hospedagem gratuita'}</span><span class="chv">▾</span></div><div class="sub-acc-b"></div></div>`);
      const sb=sub.querySelector('.sub-acc-b');
      p.cid.forEach(c=>{const v=c.dias*p.dpd;sb.appendChild(el(`<div class="crow2"><span class="nm">${c.nome}</span><span class="d">${c.dias}d × ${fmtR(p.dpd)}/dia</span><span class="v">${p.dpd>0?fmtR(v):'—'}</span></div>`))});
      body.appendChild(sub);
    });
    if(trensDoMes.length){
      const subTrem=el(`<div><div class="sub-acc-h" onclick="toggleAcc(this)"><span class="nm">🚆 Passagens de trem</span><span class="tot">${fmtR(totMesTrens)}</span><span class="chv">▾</span></div><div class="sub-acc-b"></div></div>`);
      const sbt=subTrem.querySelector('.sub-acc-b');
      trensDoMes.forEach(t=>{
        sbt.appendChild(el(`<div class="crow2"><span class="nm">${t.origem} → ${t.destino}${t.noturno?' 🌙':''}</span><span class="d">${t.noturno?'noturno':'diurno'} · €${t.eur}</span><span class="v">${fmtR(t.brl)}</span></div>`));
      });
      body.appendChild(subTrem);
    }
    cont.appendChild(acc);
  });
  return wrap;
}

function pageVistos(){
  const wrap=el(`<div><div class="info">ℹ️ Passaporte brasileiro entra sem visto na maioria dos destinos. Abaixo, os que exigem visto.</div><div class="sect">Países que exigem visto</div><div id="vl"></div></div>`);
  const cont=wrap.querySelector('#vl'); let totalV=0;
  VISTOS.forEach(v=>{
    totalV+=v.custo; const p=PAISES_DB[v.id];
    cont.appendChild(el(`<div class="vcard"><div class="pais">${FLAGS[v.id]} ${p.nome}</div><div class="fld"><label>Prazo/Validade</label><span>${v.prazo}</span></div><div class="fld"><label>Como tirar</label><span>${v.forma}</span></div><div class="fld vlr"><label>Custo estimado</label><div class="num">${fmtR(v.custo)}</div></div>${v.alerta?`<div class="valert">⚠️ ${v.alerta}</div>`:''}</div>`));
  });
  cont.insertBefore(el(`<div class="info"><b>Total estimado em vistos: ${fmtR(totalV)}</b> — incluído no contador de custos.</div>`), cont.firstChild);
  return wrap;
}

function pageVacinas(){
  const wrap=el(`<div><div class="info">ℹ️ Marque as vacinas já tomadas.</div><div class="sect">Vacinas necessárias</div><div id="vc"></div></div>`);
  const cont=wrap.querySelector('#vc');
  VACINAS.forEach((v,i)=>{
    const tomada=!!v.tomada;
    const row=el(`<div class="vacrow ${tomada?'ok':''}"><input type="checkbox" ${tomada?'checked':''}><div><div class="nm">${v.nome}</div><div class="dst">📍 ${v.destinos}</div></div><div class="prz"><div class="lb">Quando tomar</div>${v.prazo}</div><div class="dt">${tomada?'<span style="color:var(--ok)">✓ tomada</span>':'—'}</div></div>`);
    const cb=row.querySelector('input'), dt=row.querySelector('.dt');
    cb.onchange=async()=>{
      row.classList.toggle('ok',cb.checked);
      dt.innerHTML=cb.checked?'<span style="color:var(--ok)">✓ tomada</span>':'—';
      v.tomada=cb.checked;
      try{ await setDoc(doc(dbFs,'vacinas',String(i)), v); }
      catch(e){ console.error('Erro ao salvar vacina:',e); dt.innerHTML='<span style="color:var(--bad)">⚠ erro ao salvar</span>'; }
    };
    cont.appendChild(row);
  });
  return wrap;
}

async function salvarPrepSecao(i){
  try{ await setDoc(doc(dbFs,'prep',String(i)), PREP[i]); }
  catch(e){ console.error('Erro ao salvar seção de preparativos:',e); }
}
async function salvarPrepIndex(){
  try{ await setDoc(doc(dbFs,'config','prep_index'), {total: PREP.length}); }
  catch(e){ console.error('Erro ao salvar índice de preparativos:',e); }
}
async function removerPrepSecaoFirestore(i){
  try{ await deleteDoc(doc(dbFs,'prep',String(i))); }
  catch(e){ console.error('Erro ao remover seção:',e); }
}
async function resincronizarTodasSecoes(){
  // Após reordenar/remover, os índices mudam — regrava todas as seções nas novas posições
  // e apaga documentos órfãos (índices antigos além do novo total)
  try{
    const idxSnap = await getDoc(doc(dbFs,'config','prep_index'));
    const totalAntigo = idxSnap.exists() ? (idxSnap.data().total||0) : PREP.length;
    for(let i=0;i<PREP.length;i++) await setDoc(doc(dbFs,'prep',String(i)), PREP[i]);
    for(let i=PREP.length;i<totalAntigo;i++) await deleteDoc(doc(dbFs,'prep',String(i)));
    await salvarPrepIndex();
  }catch(e){ console.error('Erro ao resincronizar seções:',e); }
}

function pagePrep(){
  const wrap=el(`<div><div class="sect">Preparativos — crie seções e tarefas, marque ao concluir</div><div id="pl"></div><button class="add" id="addsec" style="margin-top:10px">+ Nova seção</button></div>`);
  const cont=wrap.querySelector('#pl');

  function renderSecoes(){
    cont.innerHTML='';
    PREP.forEach((sec,i)=>{
      const done = sec.tasks.filter(t=>t.d).length;
      const acc=el(`<div class="acc">
        <div class="acc-h prep-h">
          <button class="ordbtn" data-up="${i}" title="Mover para cima" ${i===0?'disabled':''}>↑</button>
          <button class="ordbtn" data-down="${i}" title="Mover para baixo" ${i===PREP.length-1?'disabled':''}>↓</button>
          <span class="nm sec-toggle" data-toggle="${i}" style="cursor:pointer">${sec.sec}</span>
          <span class="prog">${done}/${sec.tasks.length}</span>
          <button class="rmv" data-rmsec="${i}" title="Remover seção">✕</button>
          <span class="chv sec-toggle" data-toggle="${i}" style="cursor:pointer">▾</span>
        </div>
        <div class="acc-b" id="prep-b-${i}"></div>
      </div>`);
      const body=acc.querySelector('.acc-b');
      sec.tasks.forEach((t,ti)=>{
        const task=el(`<div class="ptask ${t.d?'done':''}"><input type="checkbox" ${t.d?'checked':''}><label class="txt">${t.t}</label><button class="rmv" data-rmtask="${i}:${ti}" title="Remover tarefa">✕</button></div>`);
        const cb=task.querySelector('input');
        cb.onchange=async()=>{
          t.d=cb.checked;
          task.classList.toggle('done',cb.checked);
          const doneCount=sec.tasks.filter(x=>x.d).length;
          acc.querySelector('.prog').textContent=`${doneCount}/${sec.tasks.length}`;
          await salvarPrepSecao(i);
        };
        body.appendChild(task);
      });
      const addTaskRow=el(`<div class="ptask" style="gap:8px">
        <input type="text" placeholder="Nova tarefa..." class="addtask-input" style="flex:1;background:var(--surf2);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:var(--rs);font-family:var(--f);font-size:13px">
        <button class="add" data-addtask="${i}" style="width:auto;padding:6px 14px">+ Adicionar</button>
      </div>`);
      body.appendChild(addTaskRow);
      cont.appendChild(acc);
    });
  }
  renderSecoes();

  cont.addEventListener('click', async e=>{
    const upI = e.target.dataset.up;
    const downI = e.target.dataset.down;
    const toggleI = e.target.dataset.toggle;
    const rmSecI = e.target.dataset.rmsec;
    const rmTask = e.target.dataset.rmtask;
    const addTaskI = e.target.dataset.addtask;

    if(toggleI!==undefined){
      const accEl = cont.children[+toggleI];
      accEl.querySelector('.acc-h').classList.toggle('on');
      accEl.querySelector('.acc-b').classList.toggle('on');
      return;
    }
    if(upI!==undefined){
      const i=+upI;
      if(i>0){ [PREP[i-1],PREP[i]]=[PREP[i],PREP[i-1]]; renderSecoes(); await resincronizarTodasSecoes(); }
      return;
    }
    if(downI!==undefined){
      const i=+downI;
      if(i<PREP.length-1){ [PREP[i+1],PREP[i]]=[PREP[i],PREP[i+1]]; renderSecoes(); await resincronizarTodasSecoes(); }
      return;
    }
    if(rmSecI!==undefined){
      if(!confirm(`Remover a seção "${PREP[+rmSecI].sec}" e todas as suas tarefas?`)) return;
      PREP.splice(+rmSecI,1);
      renderSecoes();
      await resincronizarTodasSecoes();
      return;
    }
    if(rmTask){
      const [si,ti]=rmTask.split(':').map(Number);
      PREP[si].tasks.splice(ti,1);
      renderSecoes();
      await salvarPrepSecao(si);
      return;
    }
    if(addTaskI!==undefined){
      const i=+addTaskI;
      const input = e.target.closest('.ptask').querySelector('.addtask-input');
      const texto = input.value.trim();
      if(!texto) return;
      PREP[i].tasks.push({t:texto,d:false});
      renderSecoes();
      await salvarPrepSecao(i);
    }
  });

  $('#addsec').onclick=async()=>{
    const nome = prompt('Nome da nova seção:');
    if(!nome || !nome.trim()) return;
    PREP.push({sec:nome.trim(), tasks:[]});
    renderSecoes();
    await resincronizarTodasSecoes();
  };

  return wrap;
}

const PAGES=[["roteiro","📍 Roteiro",pageRoteiro],["custos","💰 Custos",pageCustos],["vistos","🛂 Vistos",pageVistos],["vacinas","💉 Vacinas",pageVacinas],["preparativos","✅ Preparativos",pagePrep]];
function renderApp(){
  const tabsEl=$('#tabs'), pagesEl=$('#pages');
  tabsEl.innerHTML=''; pagesEl.innerHTML='';
  PAGES.forEach(([id,label,fn],i)=>{
    const tab=el(`<button class="tab ${i===0?'on':''}">${label}</button>`);
    tab.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));tab.classList.add('on');$('#pg-'+id).classList.add('on')};
    tabsEl.appendChild(tab);
    const pg=el(`<div class="pg ${i===0?'on':''}" id="pg-${id}"></div>`);
    pg.appendChild(fn());
    pagesEl.appendChild(pg);
  });
}

/* ===== FIREBASE / FIRESTORE ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOIJLwVb2Qs_sjWE0XkcusBXr-LyxVh7Y",
  authDomain: "roteiro-viagem-world.firebaseapp.com",
  projectId: "roteiro-viagem-world",
  storageBucket: "roteiro-viagem-world.firebasestorage.app",
  messagingSenderId: "353171475826",
  appId: "1:353171475826:web:ac2250948400f014b521eb"
};
const fbApp = initializeApp(firebaseConfig);
const dbFs = getFirestore(fbApp);

let CUSTOS_EXTRAS = [];

async function carregarDoFirestore(){
  try{
    const snap = await getDocs(collection(dbFs,'paises'));
    if(snap.empty){
      // Primeira vez: semear o Firestore com os dados embutidos neste arquivo
      await semear();
      return;
    }
    // Reconstituir PAISES_DB e respeitar a ordem salva em paises_index
    const novoDb = {};
    snap.forEach(d=>{ novoDb[d.id] = d.data(); });
    const metaSnap = await getDoc(doc(dbFs,'config','meta'));
    const idxSnap = await getDoc(doc(dbFs,'config','paises_index'));
    if(idxSnap.exists()){
      PAISES_INDEX.length = 0;
      idxSnap.data().ordem.forEach(id=>PAISES_INDEX.push(id));
    }
    Object.keys(PAISES_DB).forEach(k=>delete PAISES_DB[k]);
    Object.assign(PAISES_DB, novoDb);
    if(metaSnap.exists()) Object.assign(META, metaSnap.data());

    // Vacinas
    const vacSnap = await getDocs(collection(dbFs,'vacinas'));
    if(!vacSnap.empty){
      const novasVacinas = new Array(VACINAS.length);
      vacSnap.forEach(d=>{ novasVacinas[+d.id] = d.data(); });
      for(let i=0;i<VACINAS.length;i++) if(novasVacinas[i]) VACINAS[i]=novasVacinas[i];
    }

    // Preparativos
    const prepSnap = await getDocs(collection(dbFs,'prep'));
    if(!prepSnap.empty){
      const prepIdxSnap = await getDoc(doc(dbFs,'config','prep_index'));
      const total = prepIdxSnap.exists() ? prepIdxSnap.data().total : prepSnap.size;
      const novoPrep = new Array(total);
      prepSnap.forEach(d=>{ const i=+d.id; if(i<total) novoPrep[i]=d.data(); });
      PREP.length=0;
      novoPrep.forEach(s=>{ if(s) PREP.push(s); });
    }

    // Custos extras
    const custosSnap = await getDocs(collection(dbFs,'custos_extras'));
    CUSTOS_EXTRAS = [];
    custosSnap.forEach(d=>{ CUSTOS_EXTRAS.push({id:d.id, ...d.data()}); });
  }catch(e){
    console.error('Erro ao carregar do Firestore, usando dados locais:', e);
  }
}

async function semear(){
  try{
    await setDoc(doc(dbFs,'config','meta'), META);
    await setDoc(doc(dbFs,'config','paises_index'), {ordem: PAISES_INDEX});
    for(const id of PAISES_INDEX) await setDoc(doc(dbFs,'paises',id), PAISES_DB[id]);
    for(let i=0;i<VACINAS.length;i++) await setDoc(doc(dbFs,'vacinas',String(i)), VACINAS[i]);
    for(let i=0;i<PREP.length;i++) await setDoc(doc(dbFs,'prep',String(i)), PREP[i]);
    await setDoc(doc(dbFs,'config','prep_index'), {total: PREP.length});
  }catch(e){console.error('Erro ao semear Firestore:',e)}
}

(async()=>{
  await carregarDoFirestore();
  renderApp();
})();
</script>
